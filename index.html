<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飯店官網</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
    <div id="site-wrapper" class="site-wrapper">
        <div class="overlay"></div>
        <header>
            <div class="header-left">
                <div class="hamburger-icon" id="hamburger-btn">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <button class="search-button"></button>
            </div>
            <div class="header-center">
                <span class="main-logo">JUMEIRAH</span>
            </div>
            <div class="header-right">
                <a href="#" class="header-link"><i class="fas fa-user"></i>&nbsp;登入</a>
                <a href="#" class="header-link">我的訂單</a>
            </div>
        </header>

        <div class="mobile-nav" id="mobile-nav">
            <div class="mobile-nav-header">
                <span class="main-logo">JUMEIRAH</span>
                <button class="close-btn" id="close-nav-btn" aria-label="Close menu"></button>
            </div>
            <nav class="mobile-nav-links">
                <a href="#" class="active">Jumeirah Marsa Al Arab</a>
 
                <a href="#">所有住宿</a>
                <a href="#">餐飲體驗</a>
                <a href="#">獨家優惠</a>
                <a href="#">關於我們</a>
            </nav>
            <div class="mobile-nav-footer">
                <hr>
                <a href="#" class="footer-link"><i class="fas fa-user"></i>&nbsp; 登入</a>
                <a href="#" class="footer-link">我的預訂</a>
            </div>
        </div>

        <main class="main-content">
            <div id="info-panel" class="info-panel">
                <p class="subtitle"></p>
                <h1 class="title"></h1>
                <p class="description"></p>
                <div class="actions">
                    <button class="discover-btn">所有住宿</button>
                </div>
            </div>

            <div class="carousel-panel">
                <div id="carousel" class="carousel">
                    <!-- Cards will be populated here -->
                </div>
                <div class="controls">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
                <div id="counter" class="counter"></div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
