<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飯店官網</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body{overflow-x: hidden;}
    </style>
</head>
<body>
    
    <div id="site-wrapper" class="site-wrapper">
        <div class="overlay"></div>
        <header>
            <div class="header-left">
                <div class="hamburger-icon" id="hamburger-btn">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <button class="search-button"></button>
            </div>
            <div class="header-center">
                <a href="index.html" class="main-logo">JUMEIRAH</a>
            </div>
            <div class="header-right">
                <a href="login.html" class="header-link user-btn"><img src="user.png" alt="登入"></a>
                <a href="bookings.html" class="header-link bag-btn"><img src="bag.png" alt="預訂"></a>
            </div>
        </header>

        <div class="mobile-nav" id="mobile-nav">
            <div class="mobile-nav-header">
                <a href="index.html" class="main-logo">JUMEIRAH</a>
                <button class="close-btn" id="close-nav-btn" aria-label="Close menu"></button>
            </div>
            <nav class="mobile-nav-links">
                <a href="index.html" class="active">Jumeirah Marsa Al Arab</a>
 
                <a href="accommodation.html">所有住宿</a>
                <a href="dining.html">餐飲體驗</a>
                <a href="offers.html">獨家優惠</a>
                <a href="about.html">關於我們</a>
                <a href="bookings.html" class="footer-link">我的預訂</a>
                <a href="login.html" class="footer-link">登入</a>
            </nav>
           
        </div>

        <main class="main-content">
            <div id="info-panel" class="info-panel">
                <p class="subtitle">杜拜奢華新地標</p>
                <h1 class="title"> Jumeirah</h1>
                <p class="description">
                    坐落於杜拜黃金半島，卓美亞港灣酒店（Jumeirah Marsa Al Arab）結合現代設計與阿拉伯傳統，為賓客打造獨一無二的奢華體驗。
                </p>
                <div class="actions">
                    <a href="accommodation.html">
                    <button class="discover-btn">所有住宿</button>
                    </a>
                </div>
            </div>

            <div class="navigation-panel">
                <button class="nav-btn nav-btn-prev" id="nav-btn-prev">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <button class="nav-btn nav-btn-next" id="nav-btn-next">
                    <i class="fas fa-chevron-right"></i>
                </button>
                <div class="navigation-grid">
                    <a href="accommodation.html" class="nav-card">
                        <img src="https://images.unsplash.com/photo-1571896349842-33c89424de2d?w=800&h=600&fit=crop" alt="豪華客房" />
                        <div class="nav-overlay"></div>
                        <div class="nav-content">
                            <span class="nav-subtitle">專為舒適而設計</span>
                            <h3 class="nav-title">豪華客房</h3>
                        </div>
                    </a>
                    
                    <a href="accommodation.html" class="nav-card">
                        <img src="https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?w=800&h=600&fit=crop" alt="精選套房" />
                        <div class="nav-overlay"></div>
                        <div class="nav-content">
                            <span class="nav-subtitle">精緻工藝打造</span>
                            <h3 class="nav-title">精選套房</h3>
                        </div>
                    </a>
                    
                    <a href="accommodation.html" class="nav-card">
                        <img src="https://images.unsplash.com/photo-1566073771259-6a8506099945?w=800&h=600&fit=crop" alt="總統套房" />
                        <div class="nav-overlay"></div>
                        <div class="nav-content">
                            <span class="nav-subtitle">高端品味生活</span>
                            <h3 class="nav-title">總統套房</h3>
                        </div>
                    </a>
                    
                    <a href="dining.html" class="nav-card">
                        <img src="https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=800&h=600&fit=crop" alt="餐飲體驗" />
                        <div class="nav-overlay"></div>
                        <div class="nav-content">
                            <span class="nav-subtitle">環球美食之旅</span>
                            <h3 class="nav-title">餐飲體驗</h3>
                        </div>
                    </a>
                </div>
            </div>

            <!-- 訂房搜尋/篩選區塊 start -->
            <div class="booking-search-bar booking-search-floating">
              <select>
                <option>房型</option>
                <option>豪華客房</option>
                <option>精選套房</option>
                <option>總統套房</option>
              </select>
              <input type="date" id="checkin-date" name="checkin-date" min="" placeholder="入住日期">
              <input type="date" id="checkout-date" name="checkout-date" min="" placeholder="退房日期">
              <select id="adults" name="adults">
                <option value="1">1位成人</option>
                <option value="2">2位成人</option>
                <option value="3">3位成人</option>
                <option value="4">4位成人</option>
                <option value="5">5位成人</option>
                <option value="6">6位成人</option>
                <option value="7">7位成人</option>
                <option value="8">8位成人</option>
                <option value="9">9位成人</option>
                <option value="10">10位成人</option>
              </select>
              <select id="children" name="children">
                <option value="0">0位小孩</option>
                <option value="1">1位小孩</option>
                <option value="2">2位小孩</option>
                <option value="3">3位小孩</option>
                <option value="4">4位小孩</option>
                <option value="5">5位小孩</option>
                <option value="6">6位小孩</option>
                <option value="7">7位小孩</option>
                <option value="8">8位小孩</option>
                <option value="9">9位小孩</option>
                <option value="10">10位小孩</option>
              </select>
              <button class="booking-search-btn">Search</button>
            </div>
            <!-- 訂房搜尋/篩選區塊 end -->

        </main>
    </div>

    <!-- Masonry 瀑布流圖片動畫區塊 start -->
    <section class="masonry-gallery">
      <div class="masonry-card">
        <img src="https://images.unsplash.com/photo-1571896349842-33c89424de2d?w=800&h=600&fit=crop" alt="豪華客房">
        <div class="masonry-info">
          <h3>豪華客房</h3>
          <p>專為舒適而設計</p>
        </div>
      </div>
      <div class="masonry-card">
        <img src="https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?w=800&h=600&fit=crop" alt="精選套房">
        <div class="masonry-info">
          <h3>精選套房</h3>
          <p>精緻工藝打造</p>
        </div>
      </div>
      <div class="masonry-card">
        <img src="https://images.unsplash.com/photo-1566073771259-6a8506099945?w=800&h=600&fit=crop" alt="總統套房">
        <div class="masonry-info">
          <h3>總統套房</h3>
          <p>高端品味生活</p>
        </div>
      </div>
      <div class="masonry-card">
        <img src="https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=800&h=600&fit=crop" alt="餐飲體驗">
        <div class="masonry-info">
          <h3>餐飲體驗</h3>
          <p>環球美食之旅</p>
        </div>
      </div>
      <div class="masonry-card">
        <img src="https://images.unsplash.com/photo-1571896349842-33c89424de2d?w=800&h=600&fit=crop" alt="豪華客房">
        <div class="masonry-info">
          <h3>豪華客房</h3>
          <p>專為舒適而設計</p>
        </div>
      </div>
      <div class="masonry-card">
        <img src="https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?w=800&h=600&fit=crop" alt="精選套房">
        <div class="masonry-info">
          <h3>精選套房</h3>
          <p>精緻工藝打造</p>
        </div>
      </div>
    </section>
    <!-- Masonry 瀑布流圖片動畫區塊 end -->

    <script src="script.js"></script>
</body>
</html>
