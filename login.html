<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 - Jumeirah Marsa Al Arab</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="page-styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
    <div id="site-wrapper" class="site-wrapper">
        <div class="overlay"></div>
        <header>
            <div class="header-left">
                <div class="hamburger-icon" id="hamburger-btn">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <button class="search-button"></button>
            </div>
            <div class="header-center">
                <a href="index.html" class="main-logo">JUMEIRAH</a>
            </div>
            <div class="header-right">
                <a href="login.html" class="header-link user-btn"><img src="user.png" alt="登入"></a>
                <a href="bookings.html" class="header-link bag-btn"><img src="bag.png" alt="預訂"></a>
            </div>
        </header>

        <div class="mobile-nav" id="mobile-nav">
            <div class="mobile-nav-header">
                <a href="index.html" class="main-logo">JUMEIRAH</a>
                <button class="close-btn" id="close-nav-btn" aria-label="Close menu"></button>
            </div>
            <nav class="mobile-nav-links">
                <a href="index.html">Jumeirah Marsa Al Arab</a>
                <a href="accommodation.html">所有住宿</a>
                <a href="dining.html">餐飲體驗</a>
                <a href="offers.html">獨家優惠</a>
                <a href="about.html">關於我們</a>
                <a href="bookings.html" class="footer-link">我的預訂</a>
                <a href="login.html" class="footer-link active">登入</a>
            </nav>
        </div>

        <main class="main-content login-page">
            
            <div class="login-container">
                <div class="login-header">
                    <h1>歡迎回來</h1>
                    <p>登入您的帳戶，享受專屬優惠和服務</p>
                </div>

                <div class="login-tabs">
                    <button class="tab-btn active" data-tab="login">登入</button>
                    <button class="tab-btn" data-tab="register">註冊</button>
                </div>

                <div class="tab-content active" id="login">
                    <form class="login-form">
                        <div class="form-group">
                            <label for="email">電子郵件</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="password">密碼</label>
                            <input type="password" id="password" name="password" required>
                        </div>

                        <div class="form-options">
                            <label class="checkbox-label">
                                <input type="checkbox" name="remember">
                                <span class="checkmark"></span>
                                記住我
                            </label>
                            <a href="#" class="forgot-password">忘記密碼？</a>
                        </div>

                        <button type="submit" class="login-btn">登入</button>

                        <div class="social-login">
                            <p>或使用以下方式登入</p>
                            <div class="social-buttons">
                                <button type="button" class="social-btn google">
                                    <i class="fab fa-google"></i>
                                    Google
                                </button>
                            </div>
                        </div>
                    </form>
                </div>

                <div class="tab-content" id="register">
                    <form class="register-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="firstname">名字</label>
                                <input type="text" id="firstname" name="firstname" required>
                            </div>
                            <div class="form-group">
                                <label for="lastname">姓氏</label>
                                <input type="text" id="lastname" name="lastname" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="reg-email">電子郵件</label>
                            <input type="email" id="reg-email" name="email" required>
                        </div>

                        <div class="form-group">
                            <label for="phone">電話號碼</label>
                            <input type="tel" id="phone" name="phone" required>
                        </div>

                        <div class="form-group">
                            <label for="reg-password">密碼</label>
                            <input type="password" id="reg-password" name="password" required>
                        </div>

                        <div class="form-group">
                            <label for="confirm-password">確認密碼</label>
                            <input type="password" id="confirm-password" name="confirm-password" required>
                        </div>

                        <div class="form-options">
                            <label class="checkbox-label">
                                <input type="checkbox" name="terms" required>
                                <span class="checkmark"></span>
                                我同意 <a href="#">服務條款</a> 和 <a href="#">隱私政策</a>
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" name="newsletter">
                                <span class="checkmark"></span>
                                訂閱電子報，接收最新優惠資訊
                            </label>
                        </div>

                        <button type="submit" class="register-btn">註冊帳戶</button>
                    </form>
                </div>

                <div class="login-benefits">
                    <h3>登入後享受專屬優惠</h3>
                    <ul>
                        <li><i class="fas fa-check"></i> 會員專屬折扣</li>
                        <li><i class="fas fa-check"></i> 積分獎勵計劃</li>
                        <li><i class="fas fa-check"></i> 優先預訂權限</li>
                        <li><i class="fas fa-check"></i> 個人化服務</li>
                    </ul>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
